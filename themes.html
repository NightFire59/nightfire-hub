<!DOCTYPE html>
<html>
<head>
<title>Themes - Nightfire Plus</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #111;
  color: orange;
  text-align: center;
  padding-top: 50px;
}

input, button {
  margin: 10px;
  padding: 10px;
}

button {
  background: black;
  color: orange;
  border: 1px solid orange;
  cursor: pointer;
}
</style>
</head>

<body>

<h1>Themes</h1>

<h3>Upload Background</h3>
<input type="file" id="bgUpload">

<h3>Pick Accent Color</h3>
<input type="color" id="colorPicker">

<br>
<button onclick="saveTheme()">Save Theme</button>

<script>
function saveTheme() {
  const file = document.getElementById("bgUpload").files[0];
  const color = document.getElementById("colorPicker").value;

  if (file) {
    const reader = new FileReader();
    reader.onload = function(e) {
      localStorage.setItem("nf_bg", e.target.result);
      localStorage.setItem("nf_color", color);
      alert("Theme Saved!");
    };
    reader.readAsDataURL(file);
  } else {
    localStorage.setItem("nf_color", color);
    alert("Color Saved!");
  }
}
</script>

</body>
</html>
