<!DOCTYPE html>
<html>
<head>
<title>Themes - Nightfire Plus</title>
<style>
body { background:black; color:white; font-family:Arial; text-align:center; }
button{padding:10px;margin:5px;}
</style>
</head>
<body>

<a href="index.html" style="color: orange; text-decoration: none; font-size: 18px;">⬅ Home</a>

<h1>🎨 Themes</h1>

<p>Pick an accent color:</p>
<button onclick="setAccentColor('orange')">Orange</button>
<button onclick="setAccentColor('red')">Red</button>
<button onclick="setAccentColor('gold')">Gold</button>

<script>
function setAccentColor(color){
  localStorage.setItem("nf_color", color);
  document.documentElement.style.setProperty("--accent", color);
  alert("Accent color saved! Go back home to see changes.");
}
</script>

</body>
</html>
