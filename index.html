<!DOCTYPE html>
<html>
<head>
<title>Nightfire Plus</title>

<style>
body {
  margin: 0;
  font-family: Georgia, serif;
  background: #1a1a1a;
  color: orange;
  overflow-x: hidden;
}

/* BACKGROUND IMAGE (for future themes) */
body::before {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background-size: cover;
  background-position: center;
  opacity: 0.15;
  z-index: -1;
}

/* TOP BAR */
.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #111;
  padding: 15px 25px;
  border-bottom: 2px solid orange;
  box-shadow: 0 0 10px orange;
  animation: glow 3s infinite alternate;
}

.logo {
  font-size: 20px;
  font-weight: bold;
}

/* NAV */
.top-links a {
  color: orange;
  margin: 0 10px;
  text-decoration: none;
  transition: 0.3s;
}

.top-links a:hover {
  text-shadow: 0 0 10px orange;
}

/* LEFT ANGLED PANEL */
.sidebar-left {
  position: fixed;
  top: 70px;
  left: 0;
  width: 200px;
  height: calc(100% - 70px);
  background: #111;
  clip-path: polygon(0 0, 100% 0, 85% 100%, 0% 100%);
  border-right: 2px solid orange;
  padding: 20px;
}

.sidebar-left a {
  display: block;
  margin: 20px 0;
  color: orange;
  text-decoration: none;
  font-size: 20px;
}

/* RIGHT ANGLED PANEL */
.sidebar-right {
  position: fixed;
  top: 70px;
  right: 0;
  width: 220px;
  height: calc(100% - 70px);
  background: #111;
  clip-path: polygon(15% 0, 100% 0, 100% 100%, 0 100%);
  border-left: 2px solid orange;
  padding: 20px;
  text-align: right;
}

.sidebar-right a {
  display: block;
  margin: 30px 0;
  color: orange;
  text-decoration: none;
  font-size: 22px;
}

/* MAIN */
.main {
  margin-left: 200px;
  margin-right: 220px;
  padding: 30px;
  text-align: center;
}

.welcome {
  font-size: 40px;
}

.username {
  color: red;
}

/* CARDS */
.card {
  background: rgba(60,60,60,0.85);
  margin: 30px auto;
  padding: 30px;
  border-radius: 25px;
  width: 70%;
  color: gold;
  backdrop-filter: blur(5px);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
  box-shadow: 0 0 15px orange;
}

.card-title {
  background: rgba(80,80,80,0.9);
  display: inline-block;
  padding: 15px 40px;
  border-radius: 20px;
  margin-bottom: 20px;
  font-size: 28px;
}

/* LOGIN BOX */
.login-box {
  position: fixed;
  top: 80px;
  right: 20px;
  background: #111;
  padding: 15px;
  border: 1px solid orange;
  display: none;
}

.login-box input {
  padding: 5px;
  margin-bottom: 10px;
  width: 100%;
}

.login-box button {
  background: black;
  color: orange;
  border: 1px solid orange;
  padding: 5px;
  cursor: pointer;
}

/* MUSIC */
.music-btn {
  position: fixed;
  bottom: 60px;
  right: 20px;
  background: black;
  color: orange;
  border: 1px solid orange;
  padding: 10px;
  border-radius: 10px;
  cursor: pointer;
}

/* ANIMATION */
@keyframes glow {
  from { box-shadow: 0 0 5px orange; }
  to { box-shadow: 0 0 20px orange; }
}

</style>
</head>

<body>

<!-- TOP -->
<div class="topbar">
  <div class="logo">🔥 NIGHTFIRE | PLUS</div>

  <div class="top-links">
    <a href="#">Shop</a>
    <a href="#">Channels</a>
    <a href="#">Books</a>
    <a href="#" onclick="toggleLogin()">Login</a>
  </div>
</div>

<!-- LOGIN -->
<div class="login-box" id="loginBox">
  <input type="text" id="usernameInput" placeholder="Enter name">
  <button onclick="saveUser()">Enter</button>
</div>

<!-- LEFT -->
<div class="sidebar-left">
  <a href="ranks.html">Ranks</a>
  <a href="posts.html">Posts</a>
  <a href="games.html">Games</a>
  <a href="index.html">Home</a>
</div>

<!-- RIGHT -->
<div class="sidebar-right">
  <a href="friends.html">Friends</a>
  <a href="activity.html">Activity</a>
  <a href="clans.html">Clans</a>
  <a href="themes.html">Themes</a>
</div>

<!-- MAIN -->
<div class="main">
  <div class="welcome">
    Welcome: <span class="username" id="username">Guest</span>
  </div>

  <div class="card">
    <div class="card-title">Update log</div>
    <p>Nightfire Plus just launched 🚀</p>
  </div>

  <div class="card">
    <div class="card-title">Clans</div>
    <p>Make a clan and invite your friends!</p>
  </div>

  <div class="card">
    <div class="card-title">Themes</div>
    <p>Upload your own background soon 👀</p>
  </div>
</div>

<!-- MUSIC -->
<audio id="music" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<button class="music-btn" onclick="toggleMusic()">🔊 Music</button>

<script>
let playing = false;
const music = document.getElementById("music");

/* MUSIC */
function toggleMusic() {
  if (playing) {
    music.pause();
  } else {
    music.play();
  }
  playing = !playing;
}

/* LOGIN SYSTEM */
function toggleLogin() {
  const box = document.getElementById("loginBox");
  box.style.display = box.style.display === "block" ? "none" : "block";
}

function saveUser() {
  const name = document.getElementById("usernameInput").value;
  if (name) {
    localStorage.setItem("nf_user", name);
    document.getElementById("username").textContent = name;
    document.getElementById("loginBox").style.display = "none";
  }
}

/* LOAD USER */
window.onload = function() {
  const saved = localStorage.getItem("nf_user");
  if (saved) {
    document.getElementById("username").textContent = saved;
  }
};
</script>

</body>
</html>
