<!DOCTYPE html>
<html>
<head>
  <title>Nightfire Hub</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #111;
      color: orange;
    }

    .topbar {
      background: black;
      padding: 15px;
      display: flex;
      justify-content: space-between;
      border-bottom: 2px solid orange;
    }

    .sidebar-left {
      position: fixed;
      left: 0;
      top: 60px;
      width: 200px;
      height: 100%;
      background: #000;
      padding: 20px;
      border-right: 2px solid orange;
    }

    .sidebar-right {
      position: fixed;
      right: 0;
      top: 60px;
      width: 200px;
      height: 100%;
      background: #000;
      padding: 20px;
      border-left: 2px solid orange;
    }

    .main {
      margin-left: 220px;
      margin-right: 220px;
      padding: 20px;
    }

    .card {
      background: #333;
      padding: 20px;
      margin-bottom: 20px;
      border-radius: 15px;
    }
  </style>
</head>

<body>

<div class="topbar">
  <div>🔥 Nightfire Plus</div>
  <div>Login | Sign Up</div>
</div>

<div class="sidebar-left">
  <p>🏠 Home</p>
  <p>📜 Posts</p>
  <p>🎮 Games</p>
</div>

<div class="sidebar-right">
  <p>👥 Friends</p>
  <p>⚡ Activity</p>
  <p>🎨 Themes</p>
</div>

<div class="main">
  <h1>Welcome, Guest</h1>

  <div class="card">
    <h2>Update Log</h2>
    <p>Site just launched 🔥</p>
  </div>

  <div class="card">
    <h2>Clans</h2>
    <p>Create a clan and invite your friends!</p>
  </div>

</div>

</body>
</html>
