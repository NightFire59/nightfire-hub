<!DOCTYPE html>
<html>
<head>
<title>Nightfire Plus</title>
<style>
:root { --accent: orange; }

body {
  margin: 0;
  font-family: Georgia, serif;
  background: #1a1a1a;
  color: var(--accent);
  overflow-x: hidden;
}

body::before {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background-size: cover;
  background-position: center;
  opacity: 0.15;
  z-index: -1;
}

/* TOP BAR */
.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #111;
  padding: 15px 25px;
  border-bottom: 2px solid var(--accent);
  box-shadow: 0 0 10px var(--accent);
}

.logo { font-size: 20px; font-weight: bold; }

/* NAV */
.top-links a {
  color: var(--accent);
  margin: 0 10px;
  text-decoration: none;
  transition: 0.3s;
}
.top-links a:hover { text-shadow: 0 0 10px var(--accent); }

/* SIDE BARS */
.sidebar-left {
  position: fixed;
  top: 70px;
  left: 0;
  width: 200px;
  height: calc(100% - 70px);
  background: #111;
  clip-path: polygon(0 0, 100% 0, 85% 100%, 0% 100%);
  border-right: 2px solid var(--accent);
  padding: 20px;
}
.sidebar-left a {
  display: block;
  margin: 20px 0;
  color: orange;
  text-decoration: none;
  font-size: 20px;
}

.sidebar-right {
  position: fixed;
  top: 70px;
  right: 0;
  width: 220px;
  height: calc(100% - 70px);
  background: #111;
  clip-path: polygon(15% 0, 100% 0, 100% 100%, 0 100%);
  border-left: 2px solid var(--accent);
  padding: 20px;
  text-align: right;
}
.sidebar-right a {
  display: block;
  margin: 30px 0;
  color: orange;
  text-decoration: none;
  font-size: 22px;
}

/* MAIN */
.main {
  margin-left: 200px;
  margin-right: 220px;
  padding: 30px;
  text-align: center;
}
.welcome { font-size: 40px; }

/* CARDS */
.card {
  background: rgba(60,60,60,0.85);
  margin: 30px auto;
  padding: 30px;
  border-radius: 25px;
  width: 70%;
  color: gold;
  backdrop-filter: blur(5px);
  transition: 0.3s;
}
.card:hover {
  transform: translateY(-5px);
  box-shadow: 0 0 15px var(--accent);
}
.card-title {
  background: rgba(80,80,80,0.9);
  display: inline-block;
  padding: 15px 40px;
  border-radius: 20px;
  margin-bottom: 20px;
  font-size: 28px;
}

/* MUSIC */
.music-btn {
  position: fixed;
  bottom: 60px;
  right: 20px;
  background: black;
  color: orange;
  border: 1px solid var(--accent);
  padding: 10px;
  border-radius: 10px;
  cursor: pointer;
}
</style>
</head>

<body>
<!-- TOP -->
<div class="topbar">
  <div class="logo">🔥 NIGHTFIRE PLUS</div>
  <div class="top-links">
    <a href="#">Shop</a>
    <a href="#">Channels</a>
    <a href="#">Books</a>
    <a href="#" onclick="loginUser()">Login</a>
    <a href="#" onclick="registerUser()">Register</a>
  </div>
</div>

<!-- LEFT -->
<div class="sidebar-left">
  <a href="ranks.html">Ranks</a>
  <a href="posts.html">Posts</a>
  <a href="games.html">Games</a>
  <a href="index.html">Home</a>
</div>

<!-- RIGHT -->
<div class="sidebar-right">
  <a href="friends.html">Friends</a>
  <a href="activity.html">Activity</a>
  <a href="clans.html">Clans</a>
  <a href="themes.html">Themes</a>
</div>

<!-- MAIN -->
<div class="main">
  <div class="welcome">
    Welcome: <span id="username">Guest</span>
  </div>

  <div class="card">
    <div class="card-title">Update log</div>
    <p>Nightfire Plus just launched 🚀</p>
  </div>

  <div class="card">
    <div class="card-title">Clans</div>
    <p>Make a clan and invite your friends!</p>
  </div>

  <div class="card">
    <div class="card-title">Themes</div>
    <p>Upload your own background soon 👀</p>
  </div>
</div>

<!-- MUSIC -->
<audio id="music" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>
<button class="music-btn" onclick="toggleMusic()">🔊 Music</button>

<script>
let playing = false;
const music = document.getElementById("music");
function toggleMusic() {
  playing ? music.pause() : music.play();
  playing = !playing;
}

/* SIMPLE LOGIN/REGISTER */
function registerUser() {
  const name = prompt("Enter username:");
  const pass = prompt("Enter password:");
  if(!name||!pass)return alert("Invalid input");
  let users = JSON.parse(localStorage.getItem("nf_users")||"{}");
  if(users[name]) return alert("Username exists!");
  users[name]=pass;
  localStorage.setItem("nf_users", JSON.stringify(users));
  alert("Registered! Log in now.");
}

function loginUser() {
  const name = prompt("Username:");
  const pass = prompt("Password:");
  let users = JSON.parse(localStorage.getItem("nf_users")||"{}");
  if(users[name]&&users[name]===pass){
    localStorage.setItem("nf_user", name);
    document.getElementById("username").textContent = name;
    alert("Logged in as "+name);
  } else alert("Wrong username/password");
}

/* LOAD USER AND THEME */
window.onload = function() {
  const saved = localStorage.getItem("nf_user");
  if(saved) document.getElementById("username").textContent = saved;
  
  const bg = localStorage.getItem("nf_bg");
  const color = localStorage.getItem("nf_color");
  if(bg) document.body.style.backgroundImage = `url(${bg})`;
  if(color) document.documentElement.style.setProperty("--accent", color);
}

/* THEME COLOR PICKER */
function setAccentColor(color){
  document.documentElement.style.setProperty("--accent", color);
  localStorage.setItem("nf_color", color);
}

/* REMOVE URL HASH */
window.addEventListener("hashchange",()=>{ history.replaceState(null,null," "); });
</script>

</body>
</html>
