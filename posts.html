<!DOCTYPE html>
<html>
<head>
<title>Posts - Nightfire Plus</title>
<style>
body{background:#111;color:orange;font-family:Arial;text-align:center;padding:20px;}
.card{background:rgba(60,60,60,0.85);margin:10px auto;padding:20px;border-radius:15px;width:60%;color:gold;}
button{padding:10px;margin:10px;}
</style>
</head>
<body>

<a href="index.html" style="color: orange; text-decoration: none; font-size: 18px;">⬅ Home</a>
<h1>📜 Posts</h1>
<button onclick="addPost()">➕ Add Post</button>
<div id="postsContainer"></div>

<script>
function addPost(){
  const post = prompt("Write your post:");
  if(!post) return;
  let posts = JSON.parse(localStorage.getItem("nf_posts")||"[]");
  posts.unshift({user:localStorage.getItem("nf_user")||"Guest",text:post});
  localStorage.setItem("nf_posts", JSON.stringify(posts));
  displayPosts();
}

function displayPosts(){
  const container=document.getElementById("postsContainer");
  const posts=JSON.parse(localStorage.getItem("nf_posts")||"[]");
  container.innerHTML="";
  posts.forEach(p=>{
    const div=document.createElement("div");
    div.className="card";
    div.innerHTML=`<strong>${p.user}</strong>: ${p.text}`;
    container.appendChild(div);
  });
}
window.onload=displayPosts;
</script>

</body>
</html>
