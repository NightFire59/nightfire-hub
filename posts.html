<!DOCTYPE html>
<html>
<head>
<title>Posts - Nightfire Plus</title>
<style>
body{background:#111;color:orange;font-family:Arial;padding:20px;}
textarea{width:80%;height:80px;padding:10px;margin:10px 0;font-size:16px;}
button{padding:8px 12px;margin:5px;cursor:pointer;}
.card{background:rgba(60,60,60,0.85);margin:10px auto;padding:15px;border-radius:15px;width:70%;color:gold;}
a{color:orange;text-decoration:none;font-size:18px;}
</style>
</head>
<body>

<a href="index.html">⬅ Home</a>
<h1>📜 Posts</h1>

<div>
  <textarea id="postText" placeholder="Write your post..."></textarea><br>
  <button onclick="addPost()">Post</button>
</div>

<div id="postsContainer"></div>

<script>
function addPost(){
  const txt=document.getElementById("postText").value;
  if(!txt) return;
  const user=localStorage.getItem("nf_user")||"Guest";
  let posts=JSON.parse(localStorage.getItem("nf_posts")||"[]");
  posts.unshift({user:user,text:txt});
  localStorage.setItem("nf_posts", JSON.stringify(posts));
  document.getElementById("postText").value="";
  displayPosts();
}

function displayPosts(){
  const container=document.getElementById("postsContainer");
  container.innerHTML="";
  const posts=JSON.parse(localStorage.getItem("nf_posts")||"[]");
  posts.forEach(p=>{
    const div=document.createElement("div");
    div.className="card";
    div.innerHTML=`<strong>${p.user}</strong>: ${p.text}`;
    container.appendChild(div);
  });
}

window.onload=displayPosts;
</script>

</body>
</html>
